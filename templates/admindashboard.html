<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f4f4;
}

header{
background:#2c5364;
color:white;
padding:20px;
text-align:center;
font-size:28px;
}

.stats{
display:flex;
justify-content:center;
gap:30px;
margin:30px;
}

.card{
background:white;
padding:20px;
width:200px;
text-align:center;
border-radius:10px;
box-shadow:0 5px 10px rgba(0,0,0,0.2);
}

table{
width:80%;
margin:auto;
border-collapse:collapse;
background:white;
}

th,td{
padding:12px;
border:1px solid #ddd;
text-align:center;
}

th{
background:#2c5364;
color:white;
}

.delete{
background:red;
color:white;
padding:6px 12px;
border:none;
border-radius:5px;
cursor:pointer;
}

</style>

</head>

<body>

<header>The Green Bites - Admin Dashboard</header>

<div class="stats">

<div class="card">
<h3>Total Orders</h3>
<h2>{{total_orders}}</h2>
</div>

<div class="card">
<h3>Total Sales</h3>
<h2>₹ {{total_sales}}</h2>
</div>

</div>

<h2 style="text-align:center">Orders List</h2>

<table>

<tr>
<th>ID</th>
<th>Item</th>
<th>Price</th>
<th>Quantity</th>
<th>Total</th>
<th>Action</th>
</tr>

{% for order in orders %}

<tr>

<td>{{order[0]}}</td>
<td>{{order[1]}}</td>
<td>{{order[2]}}</td>
<td>{{order[3]}}</td>
<td>{{order[4]}}</td>

<td>
<a href="/delete/{{order[0]}}">
<button class="delete">Delete</button>
</a>
</td>

</tr>

{% endfor %}

</table>

</body>
</html>
