<!DOCTYPE html>
<html>
<head>
<title>Payment</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
text-align:center;
width:350px;
}

h2{
color:#2c5364;
}

.amount{
font-size:24px;
font-weight:bold;
margin:10px 0;
color:#2563eb;
}

.qr{
margin:20px 0;
}

button{
padding:10px 20px;
background:#16a34a;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="box">

<h2>Scan & Pay</h2>

<p>Total Amount</p>

<div class="amount">₹ {{total}}</div>

<div class="qr">

<img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=upi://pay?pa=example@upi&pn=GreenBites&am={{total}}" alt="QR Code">

</div>

<p>Scan using any UPI app</p>

<a href="/paydone">
<button>Payment Done</button>
</a>

</div>

</body>
</html>
