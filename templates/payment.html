<!DOCTYPE html>
<html>
<head>
<title>Payment</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
text-align:center;
}

img{
width:200px;
margin:20px 0;
}

button{
padding:10px 20px;
background:#16a34a;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="box">

<h2>UPI Payment</h2>

<h3>Total: ₹{{total}}</h3>

<p>Scan QR Code to Pay</p>

<img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=upi://pay">

<br>

<a href="/success">
<button>Payment Done</button>
</a>

</div>

</body>
</html>
