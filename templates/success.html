<!DOCTYPE html>
<html>
<head>
<title>Order Success</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.box{
background:white;
padding:35px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
text-align:center;
width:350px;
}

h2{
color:green;
margin-bottom:10px;
}

.token{
font-size:40px;
color:#2c5364;
margin:15px 0;
font-weight:bold;
}

.buttons{
margin-top:20px;
}

button{
padding:10px 20px;
margin:5px;
background:#2563eb;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
font-size:15px;
}

button:hover{
background:#1e40af;
}

.track{
background:#16a34a;
}

.track:hover{
background:#15803d;
}

</style>

</head>

<body>

<div class="box">

<h2>Payment Successful ✅</h2>

<p>Your Order is Confirmed</p>
<p>Order is getting processed. Thank you!</p>

<h3>Your Token Number</h3>

<div class="token">#{{token}}</div>

<div class="buttons">

<a href="/userorders">
<button class="track">Track My Order</button>
</a>

<a href="/userpanel">
<button>Back to Menu</button>
</a>

</div>

</div>

</body>
</html>
