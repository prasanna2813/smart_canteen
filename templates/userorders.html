<!DOCTYPE html>
<html>
<head>
<title>My Orders</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
}

.container{
width:70%;
margin:auto;
margin-top:50px;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:12px;
border-bottom:1px solid #ddd;
text-align:center;
}

th{
background:#2c5364;
color:white;
}

.pending{
color:orange;
font-weight:bold;
}

.accepted{
color:blue;
font-weight:bold;
}

.reached{
color:green;
font-weight:bold;
}

button{
padding:10px 20px;
background:#2563eb;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<h2>My Orders</h2>

<table>

<tr>
<th>ID</th>
<th>Item</th>
<th>Price</th>
<th>Quantity</th>
<th>Total</th>
<th>Status</th>
</tr>

{% for order in orders %}

<tr>

<td>{{order[0]}}</td>
<td>{{order[2]}}</td>
<td>₹{{order[3]}}</td>
<td>{{order[4]}}</td>
<td>₹{{order[5]}}</td>

<td>

{% if order[6] == "Pending" %}
<span class="pending">🟡 Pending</span>

{% elif order[6] == "Accepted" %}
<span class="accepted">🟠 Preparing</span>

{% elif order[6] == "Reached" %}
<span class="reached">🟢 Ready</span>

{% endif %}

</td>

</tr>

{% endfor %}

</table>

<br>

<a href="/userpanel">
<button>Back to Menu</button>
</a>

</div>

</body>
</html>
