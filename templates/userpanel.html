<!DOCTYPE html>
<html>
<head>
<title>Smart Canteen Menu</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6f9;
}

header{
background:#1f2937;
color:white;
padding:15px;
text-align:center;
font-size:24px;
}

.section{
padding:30px;
}

h2{
margin-bottom:20px;
}

.menu{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 3px 8px rgba(0,0,0,0.2);
text-align:center;
}

.card img{
width:100%;
height:150px;
object-fit:cover;
border-radius:8px;
}

.price{
color:green;
font-weight:bold;
}

input{
width:60px;
padding:5px;
margin-top:5px;
}

button{
margin-top:10px;
padding:8px 15px;
background:#2563eb;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

.cart-btn{
position:fixed;
top:20px;
right:20px;
background:#16a34a;
padding:10px 20px;
border-radius:5px;
color:white;
text-decoration:none;
}

</style>

</head>

<body>

<header>Smart Canteen Menu</header>

<a href="/cart" class="cart-btn">View Cart</a>

<!-- BREAKFAST -->

<div class="section">

<h2>Breakfast</h2>

<div class="menu">

<div class="card">
<img src="https://source.unsplash.com/400x300/?dosa">
<h3>Dosa</h3>
<p class="price">₹40</p>

<form action="/add_to_cart" method="post">
<input type="hidden" name="item" value="Dosa">
<input type="hidden" name="price" value="40">
<input type="number" name="quantity" value="1" min="1">
<button>Add to Cart</button>
</form>

</div>

<div class="card">
<img src="https://source.unsplash.com/400x300/?idli">

</html>
